spring.application.name=intruder-alert
server.port=8080
spring.datasource.url=jdbc:h2:file:./data/intruder-alert;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
app.security.token-validity-hours=168
app.security.detector-api-key=change-me-detector-key
app.notifications.email-enabled=false
app.notifications.from-email=
app.notifications.dashboard-base-url=http://localhost:5173
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
